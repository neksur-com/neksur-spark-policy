# Neksur Spark Policy — test config placeholder.
#
# Plan 02-06 dispatch A places this here as a stable, named pointer for
# future tests that want to load config from the classpath via
# `ConfigFactory.load("application-test")`. Today's specs in dispatch A
# (PolicyClientSpec, KmsKeyProviderSpec) pass values directly to the
# constructors — they do NOT read this file — but Plan 02-06 dispatch C
# tests (Catalyst extension wiring) will, so the file lives here pre-emptively.
#
# Values are deliberately fake: `endpoint = "http://localhost:0"` is a
# loopback no-op (port 0 = ephemeral, never bound); the token string is
# a literal "DO NOT USE IN PROD" marker; the KMS ARN points at the
# all-zero AWS account number (000000000000) so no accidental real-CMK
# call can ever succeed from this fixture.
#
# License: BSL 1.1 (see ../../LICENSE).

spark {
  neksur {
    endpoint = "http://localhost:0"
    token    = "test-jwt-do-not-use-in-prod"
    kms {
      cmk_arn = "arn:aws:kms:us-east-1:000000000000:key/test"
    }
  }
}
